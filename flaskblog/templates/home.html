{% extends "layout.html" %}

{% block content %}
    {% for post in posts %}
        <article class="post-card">
            <div class="post-metadata">
                <span class="author">{{post.author}}</span>
                <span class="date">April 20, 2018</span>
            </div>
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
        </article>
{% endfor %}
{% endblock %}
